syntax = "proto3";

package orders;

option go_package = "mcp-gateway-go-demo/cmd/mock-grpc-backend/orders";

service OrderService {
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc CreateOrder(CreateOrderRequest) returns (Order);
}

message GetOrderRequest {
  string order_id = 1;
}

message CreateOrderRequest {
  string customer = 1;
  double amount = 2;
}

message Order {
  string order_id = 1;
  string customer = 2;
  double amount = 3;
  string status = 4;
  int32 items = 5;
}
