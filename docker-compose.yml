# MCP Gateway — production deployment
# Quick start: docker compose up -d
#
# Connect your own backends via:
#   1. Admin UI: http://localhost:8080 → Import Tools
#   2. Config file: mount your config.yaml (see backends section)
#   3. REST API: curl -X POST /api/tools

services:
  gateway:
    build: .
    container_name: mcp-gateway
    ports:
      - "8080:8080"
    environment:
      - MCP_SERVER_PORT=8080
      - MCP_DATABASE_DSN=/data/gateway.db
      # Redis (optional, uncomment to enable):
      # - MCP_CACHE_REDIS_ADDR=redis:6379
    volumes:
      - gateway-data:/data
      # Mount your custom config (optional):
      # - ./config.yaml:/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Optional: Redis for distributed cache (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: mcp-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped

volumes:
  gateway-data:
  # redis-data:
